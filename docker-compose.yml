services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      BASE_URL: http://localhost:8080/
      INSTANCE_NAME: OpenAgentSearch Local
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: [
        "CMD-SHELL",
        "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)\"",
      ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      SEARXNG_BASE_URL: http://searxng:8080
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD-SHELL",
        "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
      ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 5s

  browser:
    image: browserless/chrome:latest
    restart: unless-stopped
    profiles: ["browser"]
    ports:
      - "3000:3000"
    environment:
      CONNECTION_TIMEOUT: "120000"
      MAX_CONCURRENT_SESSIONS: "2"

